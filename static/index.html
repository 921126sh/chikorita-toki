<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toki · 알을 키우는 힐링 웹앱</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a1028; }

    @keyframes toki-fly {
      0%   { transform: translate(calc(-50% + 0px), 0) scale(1); opacity: 1; }
      40%  { transform: translate(calc(-50% + var(--sway, 0px)), -60px) scale(1); opacity: 0.9; }
      80%  { transform: translate(calc(-50% - var(--sway, 0px) * 0.5), -140px) scale(0.96); opacity: 0.35; }
      100% { transform: translate(calc(-50% + var(--sway, 0px) * 0.7), -200px) scale(0.9); opacity: 0; }
    }
    @keyframes toki-particle {
      0%   { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0.3); opacity: 0; }
    }
    @keyframes toki-fade-in {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes toki-scale-in {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="/static/egg.js"></script>
  <script type="text/babel" src="/static/scene.js"></script>
  <script type="text/babel" src="/static/app.js"></script>
</body>
</html>
